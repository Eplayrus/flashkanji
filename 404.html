<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#08080c" />
  <title>Flash Kanji</title>
  <script>
    (function () {
      var target = window.location.protocol === "file:"
        ? new URL("index/dist/", window.location.href)
        : new URL("/index/dist/", window.location.origin);
      target.search = window.location.search;
      target.hash = window.location.hash || "#home";
      window.location.replace(target.toString());
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/index/dist/#home" />
</head>
<body>
  <p><a href="/index/dist/#home">Открыть Flash Kanji</a></p>
</body>
</html>
