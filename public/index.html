<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashKanji</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <img src="/logo.svg" alt="FlashKanji" class="logo" />
    <div id="topStats"></div>
  </header>

  <main>
    <section id="cardScreen">
      <div id="queueIndicator"></div>
      <div id="card" class="card">
        <div id="cardFront" class="card-face front"></div>
        <div id="cardBack" class="card-face back hidden"></div>
      </div>
      <div class="actions">
        <button id="leftBtn">← Не помню</button>
        <button id="rightBtn">Помню →</button>
        <button id="undoBtn">Undo</button>
      </div>
    </section>

    <section id="exerciseScreen" class="hidden">
      <h2>Упражнение: вставь кандзи</h2>
      <div id="chips"></div>
      <div id="exerciseText"></div>
      <button id="submitExercise">Проверить</button>
      <div id="exerciseResult"></div>
    </section>

    <section id="settings">
      <h3>Настройки</h3>
      <label>Daily goal <input type="number" id="dailyGoal" min="1" /></label>
      <label><input type="checkbox" id="goalToggle" /> Streak засчитывать по цели</label>
      <label>Режим повтора
        <select id="requeueMode">
          <option value="count">после N карточек</option>
          <option value="minutes">через T минут</option>
        </select>
      </label>
      <label>Значение <input type="number" id="requeueValue" min="1" /></label>
      <button id="saveSettings">Сохранить</button>
      <button id="resetBtn">Сброс прогресса</button>
    </section>

    <section id="stats"></section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
