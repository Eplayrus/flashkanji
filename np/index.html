<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090d" />
  <meta name="description" content="Flash Kanji NP — front-only PWA для изучения японского языка через интерактивные уроки, review и прогресс." />
  <title>Flash Kanji NP</title>
  <link rel="icon" href="../favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <a class="brand" href="#home" aria-label="Flash Kanji">
        <img src="../logo.png" alt="Flash Kanji" />
      </a>
      <div class="top-bar-copy">
        <span class="pill">front-only PWA</span>
        <span class="pill">file:// ready</span>
      </div>
    </header>
    <main id="app" class="app-root" aria-live="polite"></main>
    <footer class="app-footer">
      <div>
        <strong>Flash Kanji NP</strong>
        <p>Вся прогрессия хранится в localStorage, без backend и без npm-зависимостей.</p>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#home">Home</a>
        <a href="#lessons">Lessons</a>
        <a href="#review">Review</a>
        <a href="#progress">Progress</a>
        <a href="#codex">Codex</a>
      </nav>
    </footer>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
