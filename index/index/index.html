<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flash Kanji</title>
  <script>
    (function () {
      var target = new URL("../index.html", window.location.href);
      target.search = window.location.search || "";
      target.hash = window.location.hash || "#home";
      window.location.replace(target.href);
    })();
  </script>
</head>
<body>
  <p>Redirecting to Flash Kanji...</p>
  <p><a href="../index.html#home">Open Flash Kanji</a></p>
</body>
</html>
