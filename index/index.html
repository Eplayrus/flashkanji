<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08080c" />
  <meta name="description" content="Flash Kanji: SRS-приложение для изучения японских кандзи." />
  <title>Flash Kanji</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <script src="vendor/chart.umd.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <div class="scene-bg" aria-hidden="true"></div>

    <header class="app-header" aria-label="Flash Kanji">
      <button class="brand-mark" type="button" data-action="route" data-route="home" aria-label="На главную">
        <img src="assets/logo.png" alt="" />
      </button>
      <div class="header-actions">
        <button class="icon-btn" type="button" data-action="theme" aria-label="Сменить тему" title="Тема">◐</button>
        <button class="icon-btn" type="button" data-action="language" aria-label="Сменить язык" title="Язык">RU</button>
        <button class="icon-btn" type="button" data-action="sound" aria-label="Звук" title="Звук">♪</button>
        <button class="icon-btn" type="button" data-action="export" aria-label="Экспорт прогресса" title="Экспорт">⇩</button>
        <button class="icon-btn" type="button" data-action="import" aria-label="Импорт прогресса" title="Импорт">⇧</button>
      </div>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Основная навигация">
      <button class="nav-btn is-active" type="button" data-action="route" data-route="home">
        <span>⌂</span><small>Главная</small>
      </button>
      <button class="nav-btn" type="button" data-action="route" data-route="learn">
        <span>文</span><small>Урок</small>
      </button>
      <button class="nav-btn" type="button" data-action="route" data-route="review">
        <span>↻</span><small>Повтор</small>
      </button>
      <button class="nav-btn" type="button" data-action="route" data-route="dictionary">
        <span>典</span><small>Словарь</small>
      </button>
      <button class="nav-btn" type="button" data-action="route" data-route="writing">
        <span>筆</span><small>Письмо</small>
      </button>
      <button class="nav-btn" type="button" data-action="route" data-route="stats">
        <span>▥</span><small>Статы</small>
      </button>
    </nav>

    <input id="progressImport" type="file" accept="application/json,.json" hidden />
    <div id="toast" class="toast" role="status" hidden></div>
  </div>
</body>
</html>
